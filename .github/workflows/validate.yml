name: Validate
on: [push, pull_request]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check SKILL.md exists
        run: test -f skills/seed-discussions/SKILL.md && echo "✓ SKILL.md found"
      - name: Check plugin.json exists
        run: test -f .claude-plugin/plugin.json && echo "✓ plugin.json found"
      - name: Check SKILL.md has frontmatter
        run: head -1 skills/seed-discussions/SKILL.md | grep -q "^---" && echo "✓ frontmatter present"
      - name: Check triggers defined
        run: grep -q "^triggers:" skills/seed-discussions/SKILL.md && echo "✓ triggers defined"
      - name: Validate plugin.json is valid JSON
        run: python3 -m json.tool .claude-plugin/plugin.json > /dev/null && echo "✓ plugin.json is valid JSON"
      - name: Validate marketplace.json is valid JSON
        run: python3 -m json.tool .claude-plugin/marketplace.json > /dev/null && echo "✓ marketplace.json is valid JSON"
