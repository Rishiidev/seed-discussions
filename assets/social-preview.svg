<svg width="1280" height="640" xmlns="http://www.w3.org/2000/svg">
  <rect width="1280" height="640" fill="#0d1117"/>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#161b22" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1280" height="640" fill="url(#grid)"/>
  <!-- Accent bar -->
  <rect x="0" y="0" width="6" height="640" fill="#58a6ff"/>
  <!-- Project name -->
  <text x="60" y="190" font-family="system-ui, -apple-system, sans-serif" font-size="88"
        font-weight="800" fill="#ffffff">seed-discussions</text>
  <!-- Value prop -->
  <text x="60" y="265" font-family="system-ui, -apple-system, sans-serif" font-size="30"
        fill="#8b949e">5 tailored GitHub Discussion posts — detected, generated, created in 60 seconds</text>
  <!-- Code block background -->
  <rect x="60" y="315" width="860" height="80" rx="8" fill="#161b22"/>
  <!-- Prompt symbol -->
  <text x="90" y="363" font-family="'Courier New', Courier, monospace" font-size="30"
        fill="#58a6ff">$ seed discussions</text>
  <!-- Tag line -->
  <text x="60" y="450" font-family="system-ui, -apple-system, sans-serif" font-size="26"
        fill="#3fb950">✓ Discussions enabled  ✓ Project type detected  ✓ 5 posts created</text>
  <!-- Pills -->
  <rect x="60" y="490" width="180" height="40" rx="20" fill="#161b22"/>
  <text x="150" y="516" font-family="system-ui, sans-serif" font-size="18"
        fill="#8b949e" text-anchor="middle">Claude Code</text>
  <rect x="255" y="490" width="135" height="40" rx="20" fill="#161b22"/>
  <text x="322" y="516" font-family="system-ui, sans-serif" font-size="18"
        fill="#8b949e" text-anchor="middle">gh CLI</text>
  <rect x="405" y="490" width="105" height="40" rx="20" fill="#161b22"/>
  <text x="457" y="516" font-family="system-ui, sans-serif" font-size="18"
        fill="#8b949e" text-anchor="middle">MIT</text>
  <!-- Username -->
  <text x="1220" y="615" font-family="system-ui, -apple-system, sans-serif" font-size="22"
        fill="#484f58" text-anchor="end">github.com/Rishiidev</text>
</svg>
